services:
  - type: web
    name: vibes-apps
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    disk:
      name: app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GATE_LOCK_ENABLED
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NEWS_DATA_DIR
        value: /opt/render/project/src/data
