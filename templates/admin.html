<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeSpeak 管理者</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section class="admin-card">
        <p class="admin-eyebrow">VibeSpeak Admin</p>
        <h1>クラスコードロック</h1>
        <p class="admin-lead">
          生徒全員にリアルタイムで反映されます。OFF にするとコード入力なしで利用できます。
        </p>

        <div class="admin-lock-panel">
          <div class="admin-lock-status">
            <span id="adminLockLabel" class="admin-lock-label">読み込み中...</span>
            <span id="adminLockHint" class="admin-lock-hint">—</span>
          </div>
          <label class="admin-toggle" for="adminLockToggle">
            <input id="adminLockToggle" type="checkbox" role="switch" aria-labelledby="adminLockLabel" />
            <span class="admin-toggle-track" aria-hidden="true">
              <span class="admin-toggle-thumb"></span>
            </span>
          </label>
        </div>

        <p class="admin-meta">本日のクラスコード（参考）: <strong id="adminTodayCode">----</strong></p>
      </section>

      <section class="admin-card admin-card-spaced">
        <h1>AIモデル選択</h1>
        <p class="admin-lead">
          添削・解説・発音アドバイスのみ切り替わります。OCR など基本処理は常に gpt-4o-mini です。
        </p>

        <fieldset class="admin-mode-fieldset">
          <legend class="admin-mode-legend">4つのAIモード</legend>
          <div class="admin-mode-options" id="adminAiModeOptions">
            <label class="admin-mode-option">
              <input type="radio" name="aiMode" value="4o-mini" />
              <span class="admin-mode-option-body">
                <span class="admin-mode-option-title">① 節約モード</span>
                <span class="admin-mode-option-desc">全機能 gpt-4o-mini</span>
              </span>
            </label>
            <label class="admin-mode-option">
              <input type="radio" name="aiMode" value="5-mini" />
              <span class="admin-mode-option-body">
                <span class="admin-mode-option-title">② 前世代mini</span>
                <span class="admin-mode-option-desc">添削・解説・発音 gpt-5-mini</span>
              </span>
            </label>
            <label class="admin-mode-option">
              <input type="radio" name="aiMode" value="5.4-mini" />
              <span class="admin-mode-option-body">
                <span class="admin-mode-option-title">③ 最新高精度</span>
                <span class="admin-mode-option-desc">添削・解説・発音 gpt-5.4-mini</span>
              </span>
            </label>
            <label class="admin-mode-option">
              <input type="radio" name="aiMode" value="5.4-nano" />
              <span class="admin-mode-option-body">
                <span class="admin-mode-option-title">④ 最安実験</span>
                <span class="admin-mode-option-desc">添削・解説・発音 gpt-5.4-nano</span>
              </span>
            </label>
          </div>
        </fieldset>

        <p class="admin-meta">現在のAIモデル: <strong id="adminActiveModel">—</strong></p>
        <p id="adminAiHint" class="admin-lock-hint admin-ai-hint">—</p>
      </section>

      <section class="admin-card admin-card-spaced">
        <h1>TTS音声（OpenAI）</h1>
        <p class="admin-lead">
          ON にすると、生徒が「音読例を聞く」を押した時だけ OpenAI のネイティブ音声を生成します。OFF 時はブラウザ標準音声です。
        </p>

        <div class="admin-lock-panel">
          <div class="admin-lock-status">
            <span id="adminTtsLabel" class="admin-lock-label">読み込み中...</span>
            <span id="adminTtsHint" class="admin-lock-hint">—</span>
          </div>
          <label class="admin-toggle" for="adminTtsToggle">
            <input id="adminTtsToggle" type="checkbox" role="switch" aria-labelledby="adminTtsLabel" />
            <span class="admin-toggle-track" aria-hidden="true">
              <span class="admin-toggle-thumb"></span>
            </span>
          </label>
        </div>
      </section>

      <p id="adminStatus" class="admin-status" aria-live="polite"></p>
      <a class="admin-back-link" href="{{ url_for('index') }}">← 生徒画面へ戻る</a>
    </main>

    <script>
      const lockToggle = document.getElementById("adminLockToggle");
      const lockLabel = document.getElementById("adminLockLabel");
      const lockHint = document.getElementById("adminLockHint");
      const aiModeInputs = Array.from(document.querySelectorAll('input[name="aiMode"]'));
      const aiHint = document.getElementById("adminAiHint");
      const ttsToggle = document.getElementById("adminTtsToggle");
      const ttsLabel = document.getElementById("adminTtsLabel");
      const ttsHint = document.getElementById("adminTtsHint");
      const activeModel = document.getElementById("adminActiveModel");
      const todayCode = document.getElementById("adminTodayCode");
      const statusText = document.getElementById("adminStatus");

      function renderLockState(lockEnabled) {
        lockToggle.checked = lockEnabled;
        lockLabel.textContent = lockEnabled ? "ロック ON（コード必須）" : "ロック OFF（解放中）";
        lockHint.textContent = lockEnabled
          ? "生徒は4桁コードの入力が必要です"
          : "生徒はコードなしでそのまま入室できます";
      }

      function renderAiModeState(aiData) {
        const mode = String(aiData.ai_mode || "4o-mini");
        aiModeInputs.forEach((input) => {
          input.checked = input.value === mode;
          input.disabled = false;
        });
        activeModel.textContent = aiData.active_model || "—";
        aiHint.textContent = aiData.hint || aiData.label || "—";
      }

      function renderTtsState(ttsEnabled) {
        ttsToggle.checked = ttsEnabled;
        ttsLabel.textContent = ttsEnabled ? "TTS音声 ON（OpenAI）" : "TTS音声 OFF（ブラウザ標準）";
        ttsHint.textContent = ttsEnabled
          ? "再生ボタン押下時のみ tts-1 で音声を生成します"
          : "生徒は無料のブラウザ標準音声で聞けます";
      }

      async function loadAdminState() {
        statusText.textContent = "状態を取得中...";
        const [lockRes, aiRes, ttsRes, codeRes] = await Promise.all([
          fetch("/api/admin/gate-lock"),
          fetch("/api/admin/ai-mode"),
          fetch("/api/admin/tts"),
          fetch("/api/gate/today"),
        ]);
        const lockData = await lockRes.json();
        const aiData = await aiRes.json();
        const ttsData = await ttsRes.json();
        const codeData = await codeRes.json();
        if (!lockRes.ok) {
          throw new Error(lockData.error || "ロック状態の取得に失敗しました");
        }
        if (!aiRes.ok) {
          throw new Error(aiData.error || "AIモードの取得に失敗しました");
        }
        if (!ttsRes.ok) {
          throw new Error(ttsData.error || "TTS状態の取得に失敗しました");
        }
        renderLockState(Boolean(lockData.lock_enabled));
        renderAiModeState(aiData);
        renderTtsState(Boolean(ttsData.tts_enabled));
        todayCode.textContent = String(codeData.code || "----").padStart(4, "0");
        statusText.textContent = "準備完了";
      }

      async function saveGateLockState(lockEnabled) {
        lockToggle.disabled = true;
        statusText.textContent = "ロック設定を保存中...";
        try {
          const response = await fetch("/api/admin/gate-lock", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ lock_enabled: lockEnabled }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "保存に失敗しました");
          }
          renderLockState(Boolean(data.lock_enabled));
          statusText.textContent = data.lock_enabled
            ? "ロックを ON にしました（全生徒に即時反映）"
            : "ロックを OFF にしました（全生徒がコードなしで利用可能）";
        } catch (error) {
          console.error(error);
          statusText.textContent = "ロック設定の保存に失敗しました。";
          await loadAdminState();
        } finally {
          lockToggle.disabled = false;
        }
      }

      async function saveAiModeState(aiMode) {
        aiModeInputs.forEach((input) => {
          input.disabled = true;
        });
        statusText.textContent = "AIモデル設定を保存中...";
        try {
          const response = await fetch("/api/admin/ai-mode", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ai_mode: aiMode }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "保存に失敗しました");
          }
          renderAiModeState(data);
          statusText.textContent = `${data.label || aiMode}（${data.active_model}）に切り替えました`;
        } catch (error) {
          console.error(error);
          statusText.textContent = "AIモデル設定の保存に失敗しました。";
          await loadAdminState();
        }
      }

      async function saveTtsState(ttsEnabled) {
        ttsToggle.disabled = true;
        statusText.textContent = "TTS設定を保存中...";
        try {
          const response = await fetch("/api/admin/tts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tts_enabled: ttsEnabled }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "保存に失敗しました");
          }
          renderTtsState(Boolean(data.tts_enabled));
          statusText.textContent = data.tts_enabled
            ? "OpenAI TTS を ON にしました"
            : "OpenAI TTS を OFF にしました（ブラウザ標準音声）";
        } catch (error) {
          console.error(error);
          statusText.textContent = "TTS設定の保存に失敗しました。";
          await loadAdminState();
        } finally {
          ttsToggle.disabled = false;
        }
      }

      lockToggle.addEventListener("change", () => {
        saveGateLockState(lockToggle.checked);
      });

      aiModeInputs.forEach((input) => {
        input.addEventListener("change", () => {
          if (!input.checked) return;
          saveAiModeState(input.value);
        });
      });

      ttsToggle.addEventListener("change", () => {
        saveTtsState(ttsToggle.checked);
      });

      loadAdminState().catch((error) => {
        console.error(error);
        statusText.textContent = "サーバーに接続できませんでした。";
      });
    </script>
  </body>
</html>
