<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTEC Speaking 対策アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='gtec/css/style.css') }}">
  <style>
    .gtec-page-bg {
      background-image: url("{{ url_for('static', filename=background.background_image) }}");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#4f46e5', dark: '#3730a3', light: '#818cf8' }
          }
        }
      }
    }
  </script>
</head>
<body class="relative min-h-screen text-slate-800 antialiased">

  <!-- 背景透かし（News と同様の自然風景） -->
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <div id="page-bg-layer" class="gtec-page-bg absolute inset-0 scale-105 opacity-[0.38]"></div>
    <div class="absolute inset-0 bg-gradient-to-br from-sky-100/75 via-white/55 to-emerald-100/70"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-emerald-50/40 via-transparent to-sky-50/30"></div>
  </div>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="glass-header sticky top-0 z-40">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white text-lg font-bold shadow">G</div>
        <div>
          <h1 class="text-lg font-bold text-indigo-700 leading-tight">GTEC Speaking 対策</h1>
          <p class="text-xs text-slate-500">ベネッセ公式評価基準準拠 · 自動採点</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="stop-btn" type="button"
          class="hidden text-xs px-3 py-1.5 rounded-full bg-red-500 hover:bg-red-600 text-white font-semibold transition-colors shadow-sm">
          ■ 停止・やり直し
        </button>
        <div id="browser-badge" class="hidden text-xs px-2 py-1 rounded-full bg-emerald-100/90 text-emerald-700 font-medium">
          音声認識 OK
        </div>
        <a href="/gtec/admin" class="text-xs px-2 py-1 rounded-full bg-white/60 text-slate-600 hover:bg-indigo-50 hover:text-indigo-700 font-medium transition-colors border border-white/80">
          管理
        </a>
      </div>
    </div>
  </header>

  <!-- ── No-support Banner ──────────────────────────────────── -->
  <div id="no-support-banner" class="hidden max-w-3xl mx-auto mt-4 px-4">
    <div class="glass-card rounded-xl p-4 flex gap-3 border-amber-200/80">
      <span class="text-amber-500 text-xl">⚠️</span>
      <div>
        <p class="font-semibold text-amber-800">このブラウザは音声認識に対応していません</p>
        <p class="text-sm text-amber-700 mt-1">
          <strong>Google Chrome</strong>（PC・Android）でアクセスしてください。
          Safariや Firefox では Web Speech API が使えません。
        </p>
      </div>
    </div>
  </div>

  <!-- ── Part Tabs ──────────────────────────────────────────── -->
  <nav class="max-w-3xl mx-auto px-4 mt-5">
    <div class="grid grid-cols-4 gap-1.5 glass-card rounded-2xl p-1.5">
      <button class="tab-btn" data-part="A">
        <span class="block font-bold text-sm">Part A</span>
        <span class="block text-xs opacity-75">音読</span>
      </button>
      <button class="tab-btn" data-part="B">
        <span class="block font-bold text-sm">Part B</span>
        <span class="block text-xs opacity-75">やり取り</span>
      </button>
      <button class="tab-btn" data-part="C">
        <span class="block font-bold text-sm">Part C</span>
        <span class="block text-xs opacity-75">ストーリー</span>
      </button>
      <button class="tab-btn" data-part="D">
        <span class="block font-bold text-sm">Part D</span>
        <span class="block text-xs opacity-75">意見表明</span>
      </button>
    </div>
  </nav>

  <!-- ── Main Content (JS-rendered) ────────────────────────── -->
  <main class="max-w-3xl mx-auto px-4 mt-5 pb-12" id="app-root"></main>

  <script src="{{ url_for('static', filename='gtec/js/app.js') }}"></script>
</body>
</html>
