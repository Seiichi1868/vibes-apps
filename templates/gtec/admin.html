<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTEC Speaking 管理画面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='gtec/css/style.css') }}">
  <style>
    .gtec-page-bg {
      background-image: url("{{ url_for('static', filename='news/images/nature-bg.jpg') }}");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body class="relative min-h-screen text-slate-800 antialiased">

  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <div class="gtec-page-bg absolute inset-0 scale-105 opacity-[0.38]"></div>
    <div class="absolute inset-0 bg-gradient-to-br from-sky-100/75 via-white/55 to-emerald-100/70"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-emerald-50/40 via-transparent to-sky-50/30"></div>
  </div>

  <header class="glass-header sticky top-0 z-40">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <div>
        <p class="text-xs font-semibold text-indigo-500 uppercase tracking-wider">GTEC Admin</p>
        <h1 class="text-lg font-bold text-indigo-800">管理画面</h1>
      </div>
      <a href="/gtec" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium whitespace-nowrap">← 生徒画面へ</a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-4">

    <section class="admin-card">
      <h2 class="admin-card-title">管理設定の解除</h2>
      <div class="flex flex-wrap gap-2 items-center">
        <input id="admin-password" type="password" inputmode="numeric" autocomplete="off"
          placeholder="管理パスワード" class="admin-input" />
        <button id="unlock-btn" type="button" class="admin-btn admin-btn-primary">解除</button>
      </div>
      <p id="lock-message" class="text-sm text-red-600 mt-2 hidden" role="alert"></p>
    </section>

    <div id="settings-panel" class="hidden space-y-4">
      <p id="status-message" class="text-sm text-emerald-700 font-medium" aria-live="polite"></p>

      {% for part, label in parts.items() %}
      <section class="admin-card" data-part="{{ part }}">
        <h2 class="admin-card-title">{{ label }}</h2>
        <div class="flex items-center justify-between gap-4 py-2">
          <div>
            <p class="font-semibold text-slate-800">準備時間</p>
            <p class="text-xs text-slate-500 mt-0.5">オフにすると、スタート後すぐに録音（または質問音声）が始まります</p>
          </div>
          <label class="admin-toggle">
            <input class="prep-toggle" data-part="{{ part }}" type="checkbox" role="switch" checked />
            <span class="admin-toggle-track"><span class="admin-toggle-thumb"></span></span>
          </label>
        </div>
        <div class="prep-seconds-row mt-3 flex flex-wrap items-center gap-2">
          <label class="text-sm text-slate-600">準備時間（秒）</label>
          <input class="prep-seconds admin-input w-24" data-part="{{ part }}" type="number"
            min="0" max="600" step="1" value="{{ defaults[part].prep_seconds }}" />
          <span class="prep-status text-xs text-indigo-600 font-medium" data-part="{{ part }}"></span>
        </div>
      </section>
      {% endfor %}
    </div>

  </main>

  <script src="{{ url_for('static', filename='gtec/js/admin.js') }}"></script>
</body>
</html>
